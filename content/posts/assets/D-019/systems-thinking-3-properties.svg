<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="52" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Системное мышление</text>
  <text x="400" y="78" text-anchor="middle" fill="#94a3b8" font-size="14">Единственный навык, который не устаревает</text>

  <!-- Central circle -->
  <circle cx="400" cy="270" r="70" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="6,4"/>
  <circle cx="400" cy="270" r="58" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="400" y="262" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">Системное</text>
  <text x="400" y="282" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">мышление</text>

  <!-- Property 1: Переносится (left) -->
  <line x1="332" y1="240" x2="200" y2="180" stroke="#3b82f6" stroke-width="2" stroke-dasharray="6,3"/>
  <circle cx="160" cy="165" r="52" fill="none" stroke="url(#accent1)" stroke-width="2.5"/>
  <text x="160" y="155" text-anchor="middle" fill="#60a5fa" font-size="28">🔄</text>
  <text x="160" y="178" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Переносится</text>

  <rect x="60" y="230" width="200" height="56" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="160" y="252" text-anchor="middle" fill="#94a3b8" font-size="11">Между ролями и индустриями.</text>
  <text x="160" y="270" text-anchor="middle" fill="#94a3b8" font-size="11">Не привязан к стеку</text>

  <!-- Property 2: Растягивается (right) -->
  <line x1="468" y1="240" x2="600" y2="180" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,3"/>
  <circle cx="640" cy="165" r="52" fill="none" stroke="url(#accent2)" stroke-width="2.5"/>
  <text x="640" y="155" text-anchor="middle" fill="#22d3ee" font-size="28">↗️</text>
  <text x="640" y="178" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Растягивается</text>

  <rect x="540" y="230" width="200" height="56" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="640" y="252" text-anchor="middle" fill="#94a3b8" font-size="11">На новые ситуации.</text>
  <text x="640" y="270" text-anchor="middle" fill="#94a3b8" font-size="11">Не ломается при смене контекста</text>

  <!-- Property 3: Усиливает (bottom) -->
  <line x1="400" y1="340" x2="400" y2="380" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
  <circle cx="400" cy="420" r="52" fill="none" stroke="url(#accent3)" stroke-width="2.5"/>
  <text x="400" y="412" text-anchor="middle" fill="#a78bfa" font-size="28">⚡</text>
  <text x="400" y="435" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Усиливает</text>

  <rect x="200" y="395" width="130" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="265" y="419" text-anchor="middle" fill="#94a3b8" font-size="10">Программист → лучше</text>

  <rect x="470" y="395" width="130" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="535" y="419" text-anchor="middle" fill="#94a3b8" font-size="10">Менеджер → лучше</text>

  <!-- Bottom tagline -->
  <text x="400" y="488" text-anchor="middle" fill="#475569" font-size="11">WEF Future of Jobs 2025 · Топ-5 навыков до 2030</text>
</svg>
