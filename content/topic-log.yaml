# DS-Tseren-Brand/content/topic-log.yaml
# Единый источник истины по всем темам контента: посты (T1) и видео (T3), одна тема - одна запись.
# С 2026-07-06 (Ф13 хвост) сюда же перенесены 62 старых записи draft-list.md - тот файл и
# content/drafts/README.md удалены, дублировать реестр было не нужно (одна тема, одно место).
#
# Lifecycle: proposed → accepted | rejected → written → ready → published (per channel) | archived
#   proposed  = идея зафиксирована, файла может ещё не быть
#   accepted  = пилот одобрил, работа начата
#   written   = черновик-файл существует, нужна доработка
#   ready     = вычитан, публикатор может забрать
#   published = вышел хотя бы на одном канале
#   archived  = отложено / заменено другой темой / отклонено
#
# Follow-up schedule (Day Open checks automatically, только для status: proposed):
#   >3 days proposed  → flag ⚠️ in DayPlan
#   >7 days proposed  → second flag 🔴 in DayPlan
#   >14 days proposed → auto-set status: archived
#
# id: "C-NNN" для тем, предложенных после 2026-06-26; "D-NNN" для старых постов
#     (id совпадает с префиксом имени файла, если файл есть)
# also: необязательный список {type, path, status} - когда ОДНА идея существует
#       ещё и в другом формате (например пост и видео на одну тему). Редкий случай.
#
# Areas:    O1=Личное O2=Спорт O3=Путешествия O4=Развитие O5=Дело O6=Смысл
# Hypostasis: I1=Человек I2=Практик I3=Методолог I4=Просветитель I5=Строитель I6=Визионер
# Types:    T1=Пост T2=Методический T3=Видео-скрипт T4=Книга T5=Презентация T6=Лендинг
#
# Channels: club (Aisystant discourse), linkedin, telegram, dzen, habr, facebook
#
# priority: 1-3, только для постов в очереди повторного использования по пятницам
#           (3 = брать в первую очередь, 2 = нужна редактура 30-60 мин, 1 = переработка). Опционально.
#
# Ритм недели (было content/content-plan.md, свёрнуто сюда 2026-07-06):
#   Понедельник - свежий пост О4/О5/О6 · Среда - свежий пост О1/О2/О3/О4 (ротация) · Пятница - пост из очереди по priority 3→2.
#   Видео - см. content/weeks/W{N}-.../plan.md текущей недели. Канал-приоритет: TikTok > Telegram > LinkedIn.
#
# To add: agent appends entry below, updates status in-place when pilot responds
# Manual request: ask agent for topics → agent reads context + this file, proposes 3-5 options
# URL auto-fill: at Week Close agent searches web for published posts with null url fields
#
# brief: (опционально, WP-480) — заполняется агентом в момент proposed → accepted, если
#        карта ЦА / SA.CAT.001 дают уверенное совпадение. Отсутствие blока не блокирует написание.
#   audience: ["A1"]           # код(ы) сегмента из карты ЦА (DS-ecosystem-development/.../audiences/)
#   productive_meme: "P-NNN"   # мем для посадки, из SA.CAT.001 (PACK-systems-art)
#   unproductive_meme: "M-NNN" # мем для разбора/антитезиса, из SA.CAT.001 (опционально)

