# Лог входящих контактов — Церен Церенов
# Quarterly-сигнал: сколько людей уровня N+1 (= калибр выше текущего, интересные коллеги)
# написали первыми за квартал.
#
# Назначение: сигнал о росте бренда — не ответы на рассылки, а входящие от незнакомых.
# Обновление: при закрытии квартала (март, июнь, сентябрь, декабрь).
# Где искать: Telegram (ЛС), LinkedIn (InMail + запросы), Email.
#
# Критерий N+1: человек, с которым Церен пришёл бы на кофе без раздумий.
# Примеры: основатель компании, профессор, знакомый на 2-3 круга вперёд, клиент мечты.

quarters:
  - quarter: "Q2 2026"
    period: "2026-04-01 / 2026-06-30"
    total_inbound: 0
    channels:
      telegram: 0
      linkedin: 0
      email: 0
    contacts: []
    note: "Базовая точка. Лог заведён 2026-06-28."

  - quarter: "Q3 2026"
    period: "2026-07-01 / 2026-09-30"
    total_inbound: null
    channels:
      telegram: null
      linkedin: null
      email: null
    contacts: []
    note: ""

